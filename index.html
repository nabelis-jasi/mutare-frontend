<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .container { display: flex; height: 100vh; font-family: sans-serif; }
        #map { flex: 2; height: 100%; border-right: 2px solid #0a4519; }
        .sidebar { flex: 1; padding: 20px; background: #f4f7f4; overflow-y: auto; }
        .log-form { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; margin: 5px 0; padding: 10px; }
        button { background: #0a4519; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>

        <div class="sidebar">
            <h2 style="color:#0a4519;">🔧 Sewer Job Log</h2>
            <div class="log-form">
                <input id="asset-id" placeholder="Manhole/Pipe ID">
                <input id="operator" placeholder="Operator Name">
                <select id="action">
                    <option value="unblocking">Unblocking</option>
                    <option value="inspection">Routine Inspection</option>
                    <option value="repair">Structural Repair</option>
                </select>
                <button onclick="saveJobLog()">Submit Log to Local DB</button>
            </div>

            <hr>
            <h3>📊 Network Health (Tableau View)</h3>
            <div id="analytics-output">
                </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
